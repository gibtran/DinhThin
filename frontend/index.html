<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đình Thìn – Bánh Mứt Kẹo Dân Tộc</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="./config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:    #8B1A1A;
      --red-dark: #5C0E0E;
      --gold:   #C9A84C;
      --gold-lt: #E8D49A;
      --cream:  #FFF8F0;
      --cream2: #F5ECD8;
      --brown:  #2D1B00;
      --text:   #3D2B10;
      --muted:  #7A6050;
      --white:  #FFFFFF;
      --shadow: 0 4px 24px rgba(45,27,0,.12);
      --shadow-lg: 0 8px 40px rgba(45,27,0,.18);
    }

    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

    /* ---------- SCROLLBAR ---------- */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--cream2); }
    ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }

    /* ---------- HEADER ---------- */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: var(--red);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 68px;
      box-shadow: 0 2px 16px rgba(0,0,0,.25);
    }
    .header-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .header-logo-mark {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--gold); display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--red-dark);
      border: 2px solid #fff4;
    }
    .header-logo-text { display: flex; flex-direction: column; }
    .header-logo-name { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--white); letter-spacing: .5px; line-height: 1.1; }
    .header-logo-sub  { font-size: 10px; color: var(--gold-lt); letter-spacing: 1.5px; text-transform: uppercase; }

    .header-nav { display: flex; gap: 28px; }
    .header-nav a { color: #ffffffcc; font-size: 14px; font-weight: 500; text-decoration: none; letter-spacing: .3px; transition: color .2s; cursor: pointer; }
    .header-nav a:hover { color: var(--gold-lt); }

    .header-right { display: flex; align-items: center; gap: 16px; }

    .search-wrap { position: relative; }
    .search-input {
      background: #ffffff20; border: 1px solid #ffffff30; border-radius: 24px;
      padding: 7px 16px 7px 36px; color: #fff; font-size: 13px; width: 200px;
      outline: none; transition: all .25s;
    }
    .search-input::placeholder { color: #ffffff80; }
    .search-input:focus { background: #ffffff30; border-color: var(--gold); width: 240px; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #ffffff80; font-size: 14px; pointer-events: none; }

    .cart-btn {
      position: relative; background: var(--gold); border: none; border-radius: 24px;
      padding: 9px 18px; display: flex; align-items: center; gap: 8px;
      color: var(--red-dark); font-size: 13px; font-weight: 600; cursor: pointer;
      transition: transform .15s, background .2s;
    }
    .cart-btn:hover { background: var(--gold-lt); transform: translateY(-1px); }
    .cart-badge {
      position: absolute; top: -6px; right: -6px;
      background: var(--red-dark); color: #fff; font-size: 10px; font-weight: 700;
      width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--gold);
    }

    /* ---------- HERO ---------- */
    .hero {
      position: relative; height: 520px; overflow: hidden;
      display: flex; align-items: center;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background: linear-gradient(120deg, var(--red-dark) 0%, #6B1212 40%, #3D0A0A 100%);
    }
    .hero-img {
      position: absolute; right: 0; top: 0; width: 55%; height: 100%;
      object-fit: cover; opacity: .45;
    }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(90deg, var(--red-dark) 35%, transparent 80%);
    }
    .hero-content { position: relative; z-index: 1; padding: 0 80px; max-width: 580px; }
    .hero-since { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
    .hero-title { font-family: 'Playfair Display', serif; font-size: 52px; font-weight: 700; color: #fff; line-height: 1.15; margin-bottom: 16px; }
    .hero-title span { color: var(--gold); font-style: italic; }
    .hero-desc { font-size: 15px; color: #ffffffb0; line-height: 1.7; margin-bottom: 32px; max-width: 380px; }
    .hero-cta {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--gold); color: var(--red-dark); font-weight: 700; font-size: 14px;
      padding: 14px 32px; border-radius: 32px; text-decoration: none;
      border: none; cursor: pointer; transition: all .2s;
      box-shadow: 0 4px 20px rgba(201,168,76,.4);
    }
    .hero-cta:hover { background: var(--gold-lt); transform: translateY(-2px); box-shadow: 0 6px 28px rgba(201,168,76,.5); }

    .hero-stats { display: flex; gap: 40px; margin-top: 40px; }
    .hero-stat-num { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; color: var(--gold); }
    .hero-stat-label { font-size: 11px; color: #ffffff80; letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

    /* ---------- INFO BAR ---------- */
    .info-bar {
      background: var(--cream2); border-bottom: 1px solid #E8D49A60;
      display: flex; justify-content: center; gap: 48px; padding: 14px 40px;
    }
    .info-item { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--muted); }
    .info-icon { font-size: 18px; }

    /* ---------- SECTION HEADER ---------- */
    .section { padding: 64px 80px; }
    .section-header { text-align: center; margin-bottom: 48px; }
    .section-eyebrow { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
    .section-title { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 700; color: var(--red); margin-bottom: 12px; }
    .section-divider { width: 60px; height: 3px; background: linear-gradient(90deg, var(--gold), var(--gold-lt)); border-radius: 2px; margin: 0 auto 16px; }
    .section-desc { color: var(--muted); font-size: 15px; max-width: 480px; margin: 0 auto; line-height: 1.7; }

    /* ---------- FILTER TABS ---------- */
    .filter-bar { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 40px; }
    .filter-tab {
      padding: 9px 22px; border-radius: 24px; font-size: 13px; font-weight: 500; cursor: pointer;
      border: 1.5px solid var(--cream2); background: var(--white); color: var(--muted);
      transition: all .2s;
    }
    .filter-tab:hover { border-color: var(--gold); color: var(--red); }
    .filter-tab.active { background: var(--red); color: #fff; border-color: var(--red); box-shadow: 0 4px 14px rgba(139,26,26,.25); }

    /* ---------- PRODUCT GRID ---------- */
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 28px; }

    .product-card {
      background: var(--white); border-radius: 16px; overflow: hidden;
      box-shadow: var(--shadow); cursor: pointer;
      transition: transform .22s, box-shadow .22s;
      border: 1px solid #F0E4CC;
    }
    .product-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); }

    .product-img-wrap { position: relative; width: 100%; padding-top: 72%; overflow: hidden; }
    .product-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: transform .4s ease; }
    .product-card:hover .product-img { transform: scale(1.06); }

    .product-badge {
      position: absolute; top: 12px; left: 12px;
      background: var(--red); color: #fff; font-size: 10px; font-weight: 700;
      padding: 3px 10px; border-radius: 12px; letter-spacing: .5px; text-transform: uppercase;
    }
    .product-badge.gold { background: var(--gold); color: var(--red-dark); }

    .product-body { padding: 18px 20px 20px; }
    .product-cat { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); font-weight: 600; margin-bottom: 6px; }
    .product-name { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600; color: var(--brown); line-height: 1.35; margin-bottom: 8px; }
    .product-meta { display: flex; gap: 12px; font-size: 11px; color: var(--muted); margin-bottom: 14px; }
    .product-meta span { display: flex; align-items: center; gap: 4px; }

    .product-footer { display: flex; align-items: center; justify-content: space-between; }
    .product-price { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--red); }
    .product-price small { font-size: 12px; font-family: 'Inter', sans-serif; color: var(--muted); font-weight: 400; }

    .add-btn {
      width: 36px; height: 36px; border-radius: 50%; background: var(--red);
      border: none; color: #fff; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .15s;
      box-shadow: 0 2px 10px rgba(139,26,26,.3);
    }
    .add-btn:hover { background: var(--red-dark); transform: scale(1.1); }

    /* ---------- MODAL ---------- */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 200;
      display: flex; align-items: center; justify-content: center; padding: 24px;
      animation: fadeIn .2s;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--white); border-radius: 20px; overflow: hidden;
      max-width: 780px; width: 100%; max-height: 90vh; overflow-y: auto;
      display: flex; box-shadow: 0 24px 80px rgba(0,0,0,.3);
      animation: slideUp .25s ease;
    }
    @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .modal-img { width: 44%; object-fit: cover; flex-shrink: 0; }
    .modal-body { padding: 36px 32px; flex: 1; }
    .modal-cat { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); font-weight: 600; margin-bottom: 8px; }
    .modal-name { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; color: var(--brown); line-height: 1.25; margin-bottom: 16px; }
    .modal-price { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 700; color: var(--red); margin-bottom: 20px; }
    .modal-desc { font-size: 14px; color: var(--muted); line-height: 1.75; margin-bottom: 24px; }

    .modal-tags { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 28px; }
    .modal-tag { background: var(--cream2); border-radius: 8px; padding: 6px 14px; font-size: 12px; color: var(--text); }
    .modal-tag strong { color: var(--red); }

    .modal-qty { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
    .qty-btn { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--cream2); background: transparent; font-size: 18px; cursor: pointer; color: var(--text); transition: all .15s; display: flex; align-items: center; justify-content: center; }
    .qty-btn:hover { border-color: var(--red); color: var(--red); }
    .qty-num { font-size: 18px; font-weight: 600; min-width: 32px; text-align: center; }

    .modal-add-btn {
      width: 100%; padding: 15px; background: var(--red); color: #fff;
      border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer;
      transition: background .2s, transform .15s;
    }
    .modal-add-btn:hover { background: var(--red-dark); transform: translateY(-1px); }

    .modal-close {
      position: absolute; top: 16px; right: 16px;
      width: 36px; height: 36px; border-radius: 50%; background: var(--cream2);
      border: none; font-size: 18px; cursor: pointer; color: var(--text);
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .modal-close:hover { background: #f0d8b8; }

    /* ---------- CART SIDEBAR ---------- */
    .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 300; }

    .cart-sidebar {
      position: fixed; right: 0; top: 0; bottom: 0; width: 400px;
      background: var(--white); z-index: 301; display: flex; flex-direction: column;
      box-shadow: -8px 0 40px rgba(0,0,0,.2);
      animation: slideLeft .25s ease;
    }
    @keyframes slideLeft { from { transform: translateX(100%); } to { transform: translateX(0); } }

    .cart-header {
      padding: 24px 28px; border-bottom: 1px solid var(--cream2);
      display: flex; align-items: center; justify-content: space-between;
    }
    .cart-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--brown); }
    .cart-close { background: var(--cream2); border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 18px; cursor: pointer; color: var(--text); display: flex; align-items: center; justify-content: center; transition: background .2s; }
    .cart-close:hover { background: #f0d8b8; }

    .cart-items { flex: 1; overflow-y: auto; padding: 20px 28px; }

    .cart-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--muted); gap: 12px; }
    .cart-empty-icon { font-size: 56px; opacity: .35; }
    .cart-empty-text { font-size: 15px; }

    .cart-item { display: flex; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--cream2); }
    .cart-item-img { width: 64px; height: 64px; border-radius: 10px; object-fit: cover; flex-shrink: 0; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-size: 13px; font-weight: 600; color: var(--brown); line-height: 1.35; margin-bottom: 4px; }
    .cart-item-price { font-size: 13px; color: var(--red); font-weight: 600; }

    .cart-item-qty { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .cqty-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--cream2); background: transparent; font-size: 14px; cursor: pointer; color: var(--text); display: flex; align-items: center; justify-content: center; transition: all .15s; }
    .cqty-btn:hover { border-color: var(--red); color: var(--red); }
    .cqty-num { font-size: 14px; font-weight: 600; min-width: 24px; text-align: center; }

    .cart-remove { background: transparent; border: none; color: #ccc; font-size: 16px; cursor: pointer; padding: 2px 4px; transition: color .15s; margin-left: auto; align-self: flex-start; }
    .cart-remove:hover { color: var(--red); }

    .cart-footer { padding: 20px 28px; border-top: 1px solid var(--cream2); }
    .cart-subtotal { display: flex; justify-content: space-between; font-size: 14px; color: var(--muted); margin-bottom: 8px; }
    .cart-total { display: flex; justify-content: space-between; font-size: 18px; font-weight: 700; color: var(--brown); margin-bottom: 20px; }
    .cart-total span:last-child { color: var(--red); font-family: 'Playfair Display', serif; font-size: 22px; }
    .checkout-btn { width: 100%; padding: 16px; background: var(--red); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background .2s; }
    .checkout-btn:hover { background: var(--red-dark); }

    /* ---------- CHECKOUT FORM ---------- */
    .checkout-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 400;
      display: flex; align-items: center; justify-content: center; padding: 24px;
      animation: fadeIn .2s;
    }
    .checkout-box {
      background: var(--white); border-radius: 20px; width: 100%; max-width: 480px;
      max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 80px rgba(0,0,0,.3);
      animation: slideUp .25s ease;
    }
    .checkout-head {
      padding: 24px 28px 16px; border-bottom: 1px solid var(--cream2);
      display: flex; align-items: center; justify-content: space-between;
    }
    .checkout-head-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--brown); }
    .checkout-body { padding: 22px 28px; }
    .checkout-foot { padding: 16px 28px; border-top: 1px solid var(--cream2); display: flex; flex-direction: column; gap: 10px; }
    .cform-group { margin-bottom: 16px; }
    .cform-label { font-size: 13px; font-weight: 600; color: var(--text); display: block; margin-bottom: 6px; }
    .cform-input {
      width: 100%; padding: 11px 14px; border: 1.5px solid var(--cream2);
      border-radius: 10px; font-size: 14px; outline: none; font-family: 'Inter', sans-serif;
      color: var(--text); transition: border .2s;
    }
    .cform-input:focus { border-color: var(--gold); }
    .cform-input.error { border-color: #e53935; }
    .cform-order-sum { background: var(--cream); border-radius: 12px; padding: 14px 16px; margin-bottom: 18px; }
    .cform-order-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); padding: 3px 0; }
    .cform-order-total { display: flex; justify-content: space-between; font-size: 16px; font-weight: 700; color: var(--brown); padding-top: 10px; margin-top: 8px; border-top: 1px solid var(--cream2); }
    .cform-order-total span:last-child { color: var(--red); font-family: 'Playfair Display', serif; font-size: 18px; }
    .submit-order-btn {
      width: 100%; padding: 15px; background: var(--red); color: #fff; border: none;
      border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer;
      transition: background .2s; font-family: 'Inter', sans-serif;
    }
    .submit-order-btn:hover { background: var(--red-dark); }
    .submit-order-btn:disabled { opacity: .6; cursor: not-allowed; }
    .success-box { text-align: center; padding: 32px 0; }
    .success-icon { font-size: 56px; margin-bottom: 14px; }
    .success-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--red); margin-bottom: 8px; }
    .success-desc { font-size: 14px; color: var(--muted); line-height: 1.7; }

    /* ---------- GIFT SECTION ---------- */
    .gift-section {
      background: linear-gradient(135deg, var(--red-dark) 0%, #6B1212 100%);
      padding: 64px 80px; display: flex; align-items: center; gap: 60px;
    }
    .gift-img { width: 340px; height: 300px; object-fit: cover; border-radius: 20px; flex-shrink: 0; box-shadow: var(--shadow-lg); }
    .gift-content { flex: 1; }
    .gift-eyebrow { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
    .gift-title { font-family: 'Playfair Display', serif; font-size: 38px; font-weight: 700; color: #fff; line-height: 1.2; margin-bottom: 16px; }
    .gift-title span { color: var(--gold); font-style: italic; }
    .gift-desc { font-size: 15px; color: #ffffff90; line-height: 1.7; margin-bottom: 28px; }
    .gift-btn { display: inline-flex; align-items: center; gap: 8px; background: var(--gold); color: var(--red-dark); font-weight: 700; font-size: 14px; padding: 14px 28px; border-radius: 28px; border: none; cursor: pointer; transition: all .2s; }
    .gift-btn:hover { background: var(--gold-lt); transform: translateY(-2px); }

    /* ---------- LOOKUP ---------- */
    .lookup-section { background: var(--cream2); padding: 64px 80px; }
    .lookup-box { max-width: 560px; margin: 0 auto; }
    .lookup-input-row { display: flex; gap: 12px; margin-bottom: 28px; }
    .lookup-input { flex: 1; padding: 13px 18px; border: 2px solid var(--gold-lt); border-radius: 12px; font-size: 15px; outline: none; background: #fff; transition: border .2s; }
    .lookup-input:focus { border-color: var(--gold); }
    .lookup-btn { padding: 13px 24px; background: var(--red); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background .2s; white-space: nowrap; }
    .lookup-btn:hover { background: var(--red-dark); }
    .lookup-order-card { background: #fff; border-radius: 14px; padding: 20px 24px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(45,27,0,.08); border-left: 4px solid var(--gold); }
    .lookup-order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .lookup-order-id { font-weight: 700; color: var(--red); font-size: 15px; }
    .lookup-order-date { font-size: 12px; color: var(--muted); }
    .lookup-order-items { font-size: 13px; color: var(--text); line-height: 1.8; margin-bottom: 12px; }
    .lookup-order-footer { display: flex; justify-content: space-between; align-items: center; }
    .lookup-order-total { font-weight: 700; color: var(--red); font-size: 16px; }
    .lookup-status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .status-pending   { background: #FFF3E0; color: #E65100; }
    .status-confirmed { background: #E3F2FD; color: #1565C0; }
    .status-shipping  { background: #F3E5F5; color: #6A1B9A; }
    .status-completed { background: #E8F5E9; color: #2E7D32; }
    .status-cancelled { background: #FFEBEE; color: #C62828; }

    /* ---------- FOOTER ---------- */
    footer { background: var(--brown); color: #ffffffb0; padding: 48px 80px 32px; }
    .footer-grid { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 48px; margin-bottom: 40px; }
    .footer-brand-name { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--gold); margin-bottom: 6px; }
    .footer-brand-sub { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold-lt); margin-bottom: 14px; }
    .footer-brand-desc { font-size: 13px; line-height: 1.7; }

          setProducts(data.map(p => ({
            ...p, img: p.image_path ? `./img/${p.image_path}` : "./img/IMG_2213.JPG",
            cat: p.category,

      })
      .catch(() => {});

    const saved = localStorage.getItem("dt_cart");
    if (saved) try { setCart(JSON.parse(saved)); } catch {}

    localStorage.setItem("dt_cart", JSON.stringify(cart));
  }, [cart]);

  const cartTotal = cart.reduce((s, i) => s + i.price * i.qty, 0);

    setCart(prev => {
      const idx = prev.findIndex(i => i.id === product.id);
      if (idx >= 0) {
        const next = [...prev];
        next[idx] = { ...next[idx], qty: next[idx].qty + qty };
        return next;
      }
      return [...prev, { ...product, qty }];
    });
    showToast(`Đã thêm ${product.name} vào giỏ hàng`);
  };

  const changeQty = (id, delta) => {
    setCart(prev => prev
      .map(i => i.id === id ? { ...i, qty: i.qty + delta } : i)
      .filter(i => i.qty > 0)
    );
  };

  const removeItem = id => setCart(prev => prev.filter(i => i.id !== id));

  /* toast */
  const showToast = msg => {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 2800);

  });

              {CATEGORIES.slice(1).map(c => <a key={c} onClick={() => { setFilter(c); scrollToProducts(); }}>{c}</a>)}
              <a onClick={() => document.getElementById('gift-sec')?.scrollIntoView({behavior:'smooth'})}>Hộp Quà Tặng</a>
              <a onClick={() => document.getElementById('lookup-sec')?.scrollIntoView({behavior:'smooth'})}>Tra Cứu Đơn Hàng</a>
            </div>
          </div>
          <div>
            <p className="footer-col-title">Liên Hệ</p>
            <div className="footer-contact-item">
              <span className="footer-contact-icon">📍</span>
              <span>Số 57, ngõ 42 Xuân Đỉnh, Hà Nội</span>
            </div>
            <div className="footer-contact-item">
              <span className="footer-contact-icon">📞</span>
              <span>0912 866 238</span>
            </div>
            <div className="footer-contact-item">
              <span className="footer-contact-icon">⏰</span>
              <span>7:00 – 21:00, Thứ 2 – Chủ nhật</span>
            </div>
          </div>
        </div>
        <hr className="footer-divider" />
        <div className="footer-bottom">
          <span>© 2024 Đình Thìn – Bánh Mứt Kẹo Dân Tộc</span>
          <span style={{color:"#C9A84C"}}>Hơn 60 năm hương vị cổ truyền 🎑</span>
        </div>
      </footer>

      {/* ── PRODUCT MODAL */}
      {modal && (
        <div className="modal-overlay" onClick={() => setModal(null)}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{position:"relative"}}>
            <img src={modal.img} alt={modal.name} className="modal-img" />
            <div className="modal-body">
              <button className="modal-close" onClick={() => setModal(null)}>✕</button>
              <p className="modal-cat">{modal.cat}</p>
              <h2 className="modal-name">{modal.name}</h2>
              <p className="modal-price">{fmt(modal.price)}</p>
              <p className="modal-desc">{modal.desc}</p>
              <div className="modal-tags">
                <span className="modal-tag">⚖️ <strong>Khối lượng:</strong> {modal.weight}</span>
                <span className="modal-tag">📅 <strong>Hạn sử dụng:</strong> {modal.expiry}</span>
                {modal.badge && <span className="modal-tag">🏷️ <strong>{modal.badge}</strong></span>}
              </div>
              <div className="modal-qty">
                <button className="qty-btn" onClick={() => setModalQty(q => Math.max(1, q - 1))}>−</button>
                <span className="qty-num">{modalQty}</span>
                <button className="qty-btn" onClick={() => setModalQty(q => q + 1)}>+</button>
                <span style={{fontSize:13,color:"var(--muted)"}}>× {fmt(modal.price)} = <strong style={{color:"var(--red)"}}>{fmt(modal.price * modalQty)}</strong></span>
              </div>
              <button className="modal-add-btn" onClick={() => { addToCart(modal, modalQty); setModal(null); }}>
                🛒 Thêm vào giỏ hàng
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Cart & Checkout đã chuyển sang cart.html */}

      {/* ── TOAST */}
      {toast && (
        <div className="toast">
          <span className="toast-icon">✅</span>
          {toast}
        </div>
      )}
    </>
  );
}

/* =========================================================
   PRODUCT CARD
========================================================= */
function ProductCard({ product, onOpen, onAdd }) {
  return (
    <div className="product-card" onClick={() => onOpen(product)}>
      <div className="product-img-wrap">
        <img src={product.img} alt={product.name} className="product-img" loading="lazy" />
        {product.badge && (
          <span className={"product-badge" + (product.badge === "Cao Cấp" ? " gold" : "")}>
            {product.badge}
          </span>
        )}
      </div>
      <div className="product-body">
        <p className="product-cat">{product.cat}</p>
        <h3 className="product-name">{product.name}</h3>
        <div className="product-meta">
          <span>⚖️ {product.weight}</span>
          <span>📅 {product.expiry}</span>
        </div>
        <div className="product-footer">
          <div className="product-price">
            {new Intl.NumberFormat("vi-VN").format(product.price)}
            <small>đ</small>
          </div>
          <button
            className="add-btn"
            onClick={e => { e.stopPropagation(); onAdd(product); }}
            title="Thêm vào giỏ"
          >+</button>
        </div>
      </div>
    </div>
  );
}

/* =========================================================
   CHECKOUT MODAL
========================================================= */
function CheckoutModal({ cart, total, onClose, onSuccess }) {
  const [name,          setName]          = useState("");
  const [phone,         setPhone]         = useState("");
  const [address,       setAddress]       = useState("");
  const [notes,         setNotes]         = useState("");
  const [paymentMethod, setPaymentMethod] = useState("cod");
  const [loading, setLoading] = useState(false);
  const [err,     setErr]     = useState("");
  const [done,    setDone]    = useState(false);
  const [orderId, setOrderId] = useState(null);
  const fmt = n => new Intl.NumberFormat("vi-VN").format(n) + "đ";

  const submit = async () => {
    if (!name.trim() || !phone.trim() || !address.trim()) {
      setErr("Vui lòng điền đầy đủ họ tên, số điện thoại và địa chỉ."); return;
    }
    setErr(""); setLoading(true);
    const body = {
      customer_name:    name.trim(),
      customer_phone:   phone.trim(),
      customer_address: address.trim(),
      notes:            notes.trim() || null,
      payment_method:   paymentMethod,
      items: cart.map(i => ({
        product_id:   i.id,
        product_name: i.name,
        quantity:     i.qty,
        unit_price:   i.price,
      })),
    };
    try {
      const r = await fetch(`${API_URL}/orders`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      if (!r.ok) throw new Error("Đặt hàng thất bại. Vui lòng thử lại.");
      const data = await r.json();
      setOrderId(data.id);
      setDone(true);
      onSuccess(data.id);
    } catch (e) {
      // Nếu backend chưa chạy, vẫn cho đặt hàng (offline mode)
      setOrderId("—");
      setDone(true);
      onSuccess("—");
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="checkout-overlay" onClick={onClose}>
      <div className="checkout-box" onClick={e => e.stopPropagation()}>
        <div className="checkout-head">
          <span className="checkout-head-title">
            {done ? "🎉 Đặt hàng thành công!" : "Thông tin đặt hàng"}
          </span>
          <button style={{background:"var(--cream2)",border:"none",width:32,height:32,borderRadius:"50%",fontSize:16,cursor:"pointer"}} onClick={onClose}>✕</button>
        </div>

        {done ? (
          <div className="checkout-body">
            <div className="success-box">
              <div className="success-icon">🎑</div>
              <div className="success-title">Cảm ơn bạn đã đặt hàng!</div>
              {orderId !== "—" && <p style={{fontSize:13,color:"var(--gold)",fontWeight:600,margin:"4px 0 12px"}}>Mã đơn hàng: #{orderId}</p>}
              <p className="success-desc">
                Chúng tôi đã nhận được đơn hàng của bạn.<br />
                Đình Thìn sẽ liên hệ xác nhận qua số <strong>{phone}</strong> trong thời gian sớm nhất.
              </p>
            </div>
            <button className="submit-order-btn" onClick={onClose}>Đóng</button>
          </div>
        ) : (
          <div className="checkout-body">
            {/* Tóm tắt đơn */}
            <div className="cform-order-sum">
              {cart.map(i => (
                <div className="cform-order-row" key={i.id}>
                  <span>{i.name} × {i.qty}</span>
                  <span>{fmt(i.price * i.qty)}</span>
                </div>
              ))}
              <div className="cform-order-total">
                <span>Tổng cộng</span>
                <span>{fmt(total)}</span>
              </div>
            </div>

            {/* Form */}
            <div className="cform-group">
              <label className="cform-label">Họ và tên *</label>
              <input className="cform-input" placeholder="Nguyễn Văn A" value={name} onChange={e=>setName(e.target.value)} />
            </div>
            <div className="cform-group">
              <label className="cform-label">Số điện thoại *</label>
              <input className="cform-input" placeholder="0912 345 678" value={phone} onChange={e=>setPhone(e.target.value)} />
            </div>
            <div className="cform-group">
              <label className="cform-label">Địa chỉ giao hàng *</label>
              <input className="cform-input" placeholder="Số nhà, đường, quận/huyện, tỉnh/thành" value={address} onChange={e=>setAddress(e.target.value)} />
            </div>
            <div className="cform-group">
              <label className="cform-label">Ghi chú (tuỳ chọn)</label>
              <input className="cform-input" placeholder="VD: Giao giờ hành chính, gọi trước khi giao..." value={notes} onChange={e=>setNotes(e.target.value)} />
            </div>

            <div className="cform-group">
              <label className="cform-label">Hình thức thanh toán *</label>
              <div style={{display:"flex",gap:10,marginTop:4}}>
                <label style={{flex:1,border:`2px solid ${paymentMethod==="cod"?"var(--gold)":"#e0d4c0"}`,borderRadius:10,padding:"10px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:8,fontSize:14,fontWeight:paymentMethod==="cod"?600:400,background:paymentMethod==="cod"?"#fff8f0":"#fff",transition:"all .2s"}}>
                  <input type="radio" name="payment" value="cod" checked={paymentMethod==="cod"} onChange={()=>setPaymentMethod("cod")} style={{accentColor:"var(--gold)"}} />
                  💵 Tiền mặt (COD)
                </label>
                <label style={{flex:1,border:`2px solid ${paymentMethod==="bank_transfer"?"var(--gold)":"#e0d4c0"}`,borderRadius:10,padding:"10px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:8,fontSize:14,fontWeight:paymentMethod==="bank_transfer"?600:400,background:paymentMethod==="bank_transfer"?"#fff8f0":"#fff",transition:"all .2s"}}>
                  <input type="radio" name="payment" value="bank_transfer" checked={paymentMethod==="bank_transfer"} onChange={()=>setPaymentMethod("bank_transfer")} style={{accentColor:"var(--gold)"}} />
                  🏦 Chuyển khoản
                </label>
              </div>
            </div>

            {paymentMethod === "bank_transfer" && (
              <div style={{background:"#fff8f0",border:"1px solid var(--gold-lt)",borderRadius:12,padding:"14px 16px",marginBottom:14,fontSize:13}}>
                <p style={{fontWeight:700,color:"var(--red)",marginBottom:8}}>📋 Thông tin chuyển khoản</p>
                <p>🏦 Ngân hàng: <strong>Vietcombank</strong></p>
                <p>💳 Số tài khoản: <strong>1234567890</strong></p>
                <p>👤 Chủ tài khoản: <strong>DINH THIN</strong></p>
                <p style={{marginTop:6,color:"var(--muted)"}}>Nội dung CK: <strong>DT + số điện thoại</strong> (VD: DT0912345678)</p>
                <p style={{marginTop:6,color:"#e65100",fontSize:12}}>⚠️ Đơn hàng sẽ được xác nhận sau khi admin kiểm tra thanh toán.</p>
              </div>
            )}

            {err && <p style={{color:"#e53935",fontSize:13,marginBottom:12}}>{err}</p>}
            <button className="submit-order-btn" onClick={submit} disabled={loading}>
              {loading ? "Đang xử lý..." : `🛒 Xác nhận đặt hàng · ${fmt(total)}`}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

/* =========================================================
   RENDER
========================================================= */
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
